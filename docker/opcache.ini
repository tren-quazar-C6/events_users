; OPcache — PHP compilado en memoria, requests mucho más rápidos
opcache.enable=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=8
opcache.max_accelerated_files=10000
opcache.revalidate_freq=0     ; 0 = nunca revalida en prod (más rápido)
opcache.validate_timestamps=0 ; 0 = no verifica timestamps (más rápido)
opcache.save_comments=1
opcache.fast_shutdown=1