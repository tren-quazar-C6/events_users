[www]
user = www-data
group = www-data

; PHP-FPM escucha en puerto TCP (más simple que socket Unix en Alpine)
listen = 127.0.0.1:9000

; Pool de workers — ajustar según RAM del VPS
pm = dynamic
pm.max_children = 10
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 5
pm.max_requests = 500

; Logs
access.log = /proc/self/fd/2
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on