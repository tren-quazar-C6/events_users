name: Deploy events_users to VPS

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f1-2)
            echo "patch=$VERSION" >> $GITHUB_OUTPUT
            echo "minor=$MINOR" >> $GITHUB_OUTPUT
            echo "major=$MAJOR" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-users-${{ hashFiles('composer.lock', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-buildx-users-
            
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          IMAGE=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')

          docker build -f Dockerfile \
            -t $IMAGE:latest \
            -t $IMAGE:${{ github.sha }} \
            .

          if [[ "${{ steps.version.outputs.is_release }}" == "true" ]]; then
            docker tag $IMAGE:latest $IMAGE:${{ steps.version.outputs.patch }}
            docker tag $IMAGE:latest $IMAGE:${{ steps.version.outputs.minor }}
            docker tag $IMAGE:latest $IMAGE:${{ steps.version.outputs.major }}
          fi

          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}

          if [[ "${{ steps.version.outputs.is_release }}" == "true" ]]; then
            docker push $IMAGE:${{ steps.version.outputs.patch }}
            docker push $IMAGE:${{ steps.version.outputs.minor }}
            docker push $IMAGE:${{ steps.version.outputs.major }}
          fi

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "→ Logging into GHCR"
            echo "${{ secrets.TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "→ Yendo al stack de infraestructura"
            cd /opt/quasar/events_infrastructure

            echo "→ Bajando última imagen de events_users"
            docker compose pull users

            echo "→ Aplicando cambios al contenedor users"
            docker compose up -d --no-deps users

            echo "→ Limpiando imágenes viejas"
            docker image prune -f

            echo "→ Estado del contenedor"
            docker compose ps users

            echo "✓ Deploy de events_users completado"